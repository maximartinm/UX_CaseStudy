{% extends "base.html" %}

{% block titulo %}Portada - Lucerna Informa{% endblock %}

{% block contenido %}
<main id="noticias">
    {% for noticia in noticias %}
    <article class="noticia">   
        <a href="noticia.php?id={{ noticia.id }}">
            <img src="{{ noticia.foto_src }}" alt="{{ noticia.titulo }}">
            <h2>{{ noticia.titulo }}</h2>
        </a>
    </article>
    {% endfor %}
</main>
{% endblock %}
