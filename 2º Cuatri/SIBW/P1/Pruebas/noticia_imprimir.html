<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Imprimir Noticia - Lucerna Informa</title>
    <link rel="stylesheet" href="estilo_imprimir.css">
</head>
<body>
    <header id="cabecera_principal">
        <div class="logo">
            <img width="100" height="80" src="luzerner_zeitung_sin_fondo.png" alt="Logo de Lucerna Noticias">
        </div>
        <div class="titulo">
            <h1>Lucerna Informa</h1>
        </div>
    </header>

    <main id="contenido_imprimir">
        <div class="titulo_noticia">
            <h2>Título de la Noticia para Imprimir</h2>
        </div>

        <div class="informacion_noticia">
            <p>Fecha de publicación: 01/01/2024</p>
            <p>Autor: Juan Pérez</p>
        </div>

        <div class="cuerpo_noticia">
            <p>Texto de la noticia que se va a imprimir.</p>
        </div>

        <div>
            <img height=30 width="30" src="FotoOsos.jpg" alt="foto de osos">
        </div>
    </main>

    <footer id="pie_pagina">
        <p>&copy; 2024 Lucerna Informa. Todos los derechos reservados.</p>
    </footer>
</body>
</html>
